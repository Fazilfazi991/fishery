<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fisheri — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Nunito', sans-serif; }

    /* ── BACKGROUND: teal top half, deep navy bottom half ── */
    body { background: #1b3d52; }

    .sky {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 50%;
      background: #72c4c4;
      z-index: 0;
      overflow: hidden;
    }

    /* ── PARTICLES EFFECT ── */
    .particle {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
      animation: drift-up var(--duration) linear infinite;
    }

    @keyframes drift-up {
      0% { transform: translateY(0); opacity: 0; }
      20% { opacity: 0.4; }
      80% { opacity: 0.2; }
      100% { transform: translateY(-100px); opacity: 0; }
    }

    /* ── LOGO PLACEHOLDER ── */
    .logo-slot {
      width: clamp(250px, 35vw, 450px);
      aspect-ratio: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 20px 50px rgba(0,0,0,0.3));
    }
    .logo-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      mix-blend-mode: screen;
    }

    /* ── CENTERED HERO ── */
    .center {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -54%);
      z-index: 30; /* Above all waves */
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: bob 5s ease-in-out infinite;
    }
    @keyframes bob {
      0%, 100% { transform: translate(-50%, -54%); }
      50%       { transform: translate(-50%, calc(-54% - 12px)); }
    }

    .brand-name {
      font-size: clamp(2.8rem, 5.5vw, 4.5rem);
      font-weight: 900;
      color: #ffffff;
      letter-spacing: -1px;
      line-height: 1;
      margin-top: 4px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.2);
    }
    .brand-sub {
      font-size: clamp(0.85rem, 1.6vw, 1.05rem);
      font-weight: 400;
      color: rgba(255,255,255,0.75);
      margin-top: 4px;
      letter-spacing: 0.3px;
    }
    .coming-soon {
      margin-top: 20px;
      font-size: clamp(0.6rem, 1.2vw, 0.75rem);
      font-weight: 700;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }

    /* ── ANIMATED WAVES ── */
    .waves-wrap {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 54%;
      z-index: 10;
      overflow: hidden;
    }

    /* ── MOBILE OPTIMIZATIONS ── */
    @media (max-width: 600px) {
      .logo-slot {
        width: clamp(220px, 80vw, 340px);
      }
      .waves-wrap {
        height: 58%;
      }
      .center {
        top: 48%;
        transform: translate(-50%, -50%);
      }
      @keyframes bob {
        0%, 100% { transform: translate(-50%, -50%); }
        50%       { transform: translate(-50%, calc(-50% - 6px)); }
      }
      .coming-soon {
        margin-top: 5px;
        letter-spacing: 4px;
        font-size: 0.75rem;
        opacity: 0.8;
      }
    }

    .wave {
      position: absolute;
      left: -25%;
      width: 150%;
    }
    
    /* 5th wave (Foam edge) */
    .wave-foam { 
      top: -2%; 
      z-index: 15;
      animation: s1 6s ease-in-out infinite alternate;
    }

    .wave-1 { top: 0;   animation: s1 7s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite alternate; }
    .wave-2 { top: 7%;  animation: s2 9s ease-in-out infinite alternate-reverse; }
    .wave-3 { top: 18%; animation: s1 11s 0.5s cubic-bezier(0.37, 0, 0.63, 1) infinite alternate; }
    .wave-4 { top: 30%; animation: s2 8s 0.2s ease-in-out infinite alternate-reverse; }

    @keyframes s1 { 
      from { transform: translate(0, 0); } 
      to   { transform: translate(-8%, 10px); } 
    }
    @keyframes s2 { 
      from { transform: translate(0, 0); } 
      to   { transform: translate(8%, -10px); } 
    }
  </style>
</head>
<body>

  <!-- Sky background -->
  <div class="sky" id="sky"></div>

  <!-- HERO — logo + brand text -->
  <div class="center">
    <div class="logo-slot">
      <img src="fisheri-logo.png" alt="Fisheri Logo" class="logo-img"/>
    </div>

    <div class="coming-soon">Coming Soon</div>
  </div>

  <!-- ANIMATED WAVE LAYERS -->
  <div class="waves-wrap">

    <!-- Wave Foam (New 5th Layer) -->
    <svg class="wave wave-foam" viewBox="0 0 1440 280" preserveAspectRatio="none">
      <path d="M-60,70 C120,10 260,150 460,70 C660,-10 800,150 1000,70 C1200,-10 1320,140 1500,70 L1500,280 L-60,280 Z"
            fill="#2e6a7a" opacity="0.3"/>
    </svg>

    <svg class="wave wave-1" viewBox="0 0 1440 280" preserveAspectRatio="none">
      <path d="M-60,70 C120,10 260,150 460,70 C660,-10 800,150 1000,70 C1200,-10 1320,140 1500,70 L1500,280 L-60,280 Z"
            fill="#1e4a5f" opacity="0.8"/>
    </svg>

    <svg class="wave wave-2" viewBox="0 0 1440 280" preserveAspectRatio="none">
      <path d="M-60,90 C140,30 300,160 520,90 C740,20 860,155 1060,90 C1260,25 1360,145 1500,90 L1500,280 L-60,280 Z"
            fill="#1a4155" opacity="0.85"/>
    </svg>

    <svg class="wave wave-3" viewBox="0 0 1440 280" preserveAspectRatio="none">
      <path d="M-60,100 C130,45 280,165 480,100 C680,35 800,160 1000,100 C1200,40 1310,155 1500,100 L1500,280 L-60,280 Z"
            fill="#163748" opacity="0.9"/>
    </svg>

    <svg class="wave wave-4" viewBox="0 0 1440 280" preserveAspectRatio="none">
      <path d="M-60,115 C120,60 260,175 460,115 C660,55 780,168 980,115 C1180,62 1290,160 1500,115 L1500,280 L-60,280 Z"
            fill="#122e3d"/>
    </svg>

  </div>

  <script>
    // Generate particle effect
    const sky = document.getElementById('sky');
    const isMobile = window.innerWidth < 600;
    const particleCount = isMobile ? 10 : 20;

    for (let i = 0; i < particleCount; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      
      const size = Math.random() * 3 + 2; // 2-5px
      const left = Math.random() * 100; // 0-100%
      const top = Math.random() * 100; // 0-100%
      const duration = Math.random() * 4 + 3; // 3-7s
      const delay = Math.random() * 5; // 0-5s
      
      particle.style.width = `${size}px`;
      particle.style.height = `${size}px`;
      particle.style.left = `${left}%`;
      particle.style.top = `${top}%`;
      particle.style.setProperty('--duration', `${duration}s`);
      particle.style.animationDelay = `${delay}s`;
      
      sky.appendChild(particle);
    }
  </script>

</body>
</html>
